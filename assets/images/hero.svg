<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2a0a"/>
      <stop offset="0.55" stop-color="#172207"/>
      <stop offset="1" stop-color="#0f1705"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#172207" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#172207" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- abstract skyline silhouettes -->
  <g fill="#A9DF59" opacity="0.06">
    <rect x="80" y="430" width="120" height="470"/>
    <rect x="230" y="360" width="90" height="540"/>
    <rect x="345" y="500" width="140" height="400"/>
    <rect x="520" y="300" width="100" height="600"/>
    <rect x="650" y="470" width="120" height="430"/>
    <rect x="800" y="380" width="150" height="520"/>
    <rect x="990" y="520" width="110" height="380"/>
    <rect x="1130" y="340" width="95" height="560"/>
    <rect x="1260" y="460" width="140" height="440"/>
    <rect x="1430" y="400" width="110" height="500"/>
  </g>
  <!-- soft diagonal light beams -->
  <g opacity="0.05" stroke="#A9DF59" stroke-width="2">
    <line x1="-100" y1="200" x2="700" y2="900"/>
    <line x1="200" y1="-100" x2="1100" y2="900"/>
    <line x1="900" y1="-100" x2="1700" y2="700"/>
  </g>
  <rect width="1600" height="900" fill="url(#fade)"/>
</svg>
